<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IMLBB 2026 — Class Yearbook</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css"/>
  <style>
    :root {
      --bg:       #0a0a0a;
      --card-bg:  #161616;
      --gold:     #e0a840;
      --gold-dim: rgba(224,168,64,.18);
      --blue:     #1b4fa8;
      --blue-dim: rgba(27,79,168,.18);
      --white:    #f0f0f0;
      --muted:    #666;
      --sans: 'Helvetica Neue', Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Top bar ─── */
    #top-bar {
      width: 8.5in;
      margin: 18px auto 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #top-bar .bar-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }
    #top-bar button {
      background: var(--gold);
      color: #000;
      border: none;
      padding: 8px 22px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--sans);
      font-weight: 700;
      border-radius: 2px;
      transition: background .15s;
    }
    #top-bar button:hover { background: #f0c050; }

    #status {
      width: 8.5in;
      margin: 30px auto;
      text-align: center;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
    }

    /* ─── Main document flow ─── */
    #yearbook-doc {
      width: 8.5in;
      margin: 0 auto;
      padding: 0 0.46in;
    }

    /* ─── Section header (IMBB or IML) ─── */
    .section-header {
      padding: 0.28in 0 0.18in;
      text-align: center;
      /* Keep the header with the first row of cards below it when printing */
      break-after: avoid;
      page-break-after: avoid;
    }
    .section-badge {
      display: inline-block;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 2px 12px;
      border-radius: 20px;
      margin-bottom: 6px;
    }
    .section-header--imbb .section-badge {
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid rgba(224,168,64,.35);
    }
    .section-header--iml .section-badge {
      background: var(--blue-dim);
      color: #7aa8f0;
      border: 1px solid rgba(27,79,168,.45);
    }
    .section-title {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: var(--white);
    }
    .section-subtitle {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }
    .section-rule {
      height: 2px;
      border: none;
      margin: 10px auto 0;
      width: 100%;
    }
    .section-header--imbb .section-rule { background: var(--gold); }
    .section-header--iml  .section-rule { background: var(--blue); }

    /* ─── Photo grid ─── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px 10px;
      padding-bottom: 0.1in;
    }

    /* ─── Card ─── */
    .yb-card {
      display: flex;
      flex-direction: column;
      min-width: 0;
      /* Don't split a card across print pages */
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /*
     * Photo: strict 3:4, object-fit:cover so every image is identical size/crop.
     * object-position: top ensures faces stay visible when portrait is tall.
     */
    .yb-photo {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: var(--card-bg);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }
    .yb-photo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
    .yb-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: 22px;
      color: #2a2a2a;
    }

    .yb-info { padding: 5px 2px 0; min-width: 0; }

    .yb-name-row {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }
    .yb-flag .fi {
      display: inline-block;
      width: 17px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
      vertical-align: middle;
    }
    .yb-name {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.2px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      color: var(--white);
    }
    .yb-title {
      font-size: 7.8px;
      line-height: 1.35;
      margin-top: 2px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .imbb .yb-title { color: var(--gold); }
    .iml  .yb-title { color: #7aa8f0;    }

    /* ─── Per-section repeating-header table ─── */
    .yb-section-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .yb-section-table > thead > tr > td,
    .yb-section-table > tbody > tr > td {
      padding: 0;
      vertical-align: top;
    }

    /* Footer line at very bottom of print output */
    #yb-footer {
      width: 8.5in;
      margin: 18px auto 24px;
      text-align: center;
      font-size: 7px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid rgba(255,255,255,.07);
      padding-top: 10px;
    }

    /* ─── Print ─── */
    @media print {
      @page { size: 8.5in 11in portrait; margin: 0.38in 0.46in; }

      *, *::before, *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }

      html, body { background: #0a0a0a !important; }
      #top-bar, #status { display: none !important; }

      /* Remove screen padding — @page margin takes over */
      #yearbook-doc { padding: 0; }

      /* IML table follows IMBB — a little top breathing room on the first page.
         On subsequent IML pages the thead repeats flush to the page margin. */
      .yb-section-table + .yb-section-table .section-header--iml {
        padding-top: 0.18in;
      }
    }
  </style>
</head>

<script>
/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function extractDriveId(v) {
  if (!v) return null;
  if (/^[a-zA-Z0-9_-]{10,}$/.test(v)) return v;
  let m = v.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (!m) m = v.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}
function drivePhoto(v, sz) {
  const id = extractDriveId(v);
  return id ? `https://drive.google.com/thumbnail?id=${id}&sz=${sz || 'w800'}` : null;
}

function getFlagHtml(country) {
  const iso = COUNTRY_ISO[(country || '').toLowerCase().trim()];
  return iso ? `<span class="fi fi-${iso}" title="${country}"></span>` : '';
}
function inferContest(title) {
  return /bootblack/i.test(title || '') ? 'IMBB' : 'IML';
}
function parseCSV(raw) {
  const rows = []; let inQ = false, cur = '', fields = [];
  for (let i = 0; i < raw.length; i++) {
    const c = raw[i];
    if (c==='"') { if (inQ&&raw[i+1]==='"') {cur+='"';i++;} else inQ=!inQ; }
    else if (c===','&&!inQ) { fields.push(cur); cur=''; }
    else if (c==='\n'&&!inQ) { fields.push(cur); if(fields.some(Boolean))rows.push(fields); fields=[];cur=''; }
    else if (c!=='\r') cur+=c;
  }
  if (cur||fields.length){fields.push(cur);if(fields.some(Boolean))rows.push(fields);}
  return rows;
}

/* ── Semaphore queue — max 4 concurrent Drive thumbnail fetches ──
   Prevents burst-rate failures while keeping progress fast.
   Each slot is held until the image settles (load, error, or watchdog). */
class SemaphoreQueue {
  constructor(max) { this._max = max; this._n = 0; this._q = []; }
  run(fn) {
    return new Promise((res, rej) => {
      this._q.push({ fn, res, rej });
      this._tick();
    });
  }
  _tick() {
    while (this._n < this._max && this._q.length) {
      const { fn, res, rej } = this._q.shift();
      this._n++;
      fn().then(v => { this._n--; res(v); this._tick(); },
                e => { this._n--; rej(e); this._tick(); });
    }
  }
}
const _imgQ = new SemaphoreQueue(4);

/* Queue one card's photo load.  Each call occupies one slot until settled. */
function queueImg(photoDiv, primaryUrl, fallbackUrl) {
  _imgQ.run(() => new Promise(done => loadOne(photoDiv, primaryUrl, fallbackUrl, false, done)));
}

/* Load a single URL into photoDiv, retry with fallback on failure.
   Always creates a fresh <img> element — never reuses one with a cached
   failure.  Handlers registered BEFORE src assignment to avoid race. */
function loadOne(photoDiv, url, fallbackUrl, isFallback, done) {
  photoDiv.innerHTML = '';           /* clear previous content / img */
  const img = document.createElement('img');
  photoDiv.appendChild(img);        /* must be in DOM before src for Chrome */

  let settled = false;
  const succeed = () => {
    if (settled) return; settled = true;
    clearTimeout(wd);
    done();
  };
  const fail = () => {
    if (settled) return; settled = true;
    clearTimeout(wd);
    if (!isFallback && fallbackUrl && url !== fallbackUrl) {
      loadOne(photoDiv, fallbackUrl, null, true, done);   /* try w400 */
    } else {
      photoDiv.innerHTML = '<div class="yb-placeholder">&#x1F3C5;</div>';
      done();
    }
  };

  img.addEventListener('load',  succeed, { once: true });
  img.addEventListener('error', fail,    { once: true });
  const wd = setTimeout(fail, 20000);  /* 20-second safety net */

  img.src = url;

  /* Sync check: browser may mark img.complete before async events fire */
  if (img.complete) {
    if (img.naturalWidth > 0) succeed();
    else                       fail();
  }
}

/* ── Build a single card ── */
function buildCard(c) {
  const card = document.createElement('div');
  card.className = `yb-card ${c.contest === 'IMBB' ? 'imbb' : 'iml'}`;

  /* Photo container — aspect-ratio enforced by CSS */
  const photoDiv = document.createElement('div');
  photoDiv.className = 'yb-photo';

  if (c.photoUrl) {
    queueImg(photoDiv, c.photoUrl, c.photoFallback);
  } else {
    photoDiv.innerHTML = '<div class="yb-placeholder">&#x1F3C5;</div>';
  }

  /* Info */
  const info = document.createElement('div');
  info.className = 'yb-info';

  const nameRow = document.createElement('div');
  nameRow.className = 'yb-name-row';
  const flagHtml = getFlagHtml(c.country);
  if (flagHtml) {
    const fw = document.createElement('span');
    fw.className = 'yb-flag';
    fw.innerHTML = flagHtml;
    nameRow.appendChild(fw);
  }
  const nameEl = document.createElement('span');
  nameEl.className = 'yb-name';
  nameEl.textContent = c.name;
  nameRow.appendChild(nameEl);

  const titleEl = document.createElement('div');
  titleEl.className = 'yb-title';
  titleEl.textContent = c.title;

  info.appendChild(nameRow);
  info.appendChild(titleEl);
  card.appendChild(photoDiv);
  card.appendChild(info);
  return card;
}

/* ── Render both grids ── */
function renderYearbook(contestants) {
  /* Sort by country then name (case-insensitive) regardless of source */
  contestants = [...contestants].sort((a, b) => {
    const ca = (a.country || '').toLowerCase();
    const cb = (b.country || '').toLowerCase();
    if (ca !== cb) return ca < cb ? -1 : 1;
    const na = (a.name || '').toLowerCase();
    const nb = (b.name || '').toLowerCase();
    return na < nb ? -1 : na > nb ? 1 : 0;
  });

  const imbb = contestants.filter(c => c.contest === 'IMBB');
  const iml  = contestants.filter(c => c.contest === 'IML');

  const edition = (typeof IML_NUMBER!=='undefined' && typeof IML_YEAR!=='undefined')
    ? `IMLBB #${IML_NUMBER} · ${IML_YEAR}` : 'IMLBB 2026';

  document.getElementById('imbb-subtitle').textContent =
    `${edition}  ·  ${imbb.length} contestant${imbb.length!==1?'s':''}`;
  document.getElementById('iml-subtitle').textContent =
    `${edition}  ·  ${iml.length} contestant${iml.length!==1?'s':''}`;

  const imbbGrid = document.getElementById('imbb-grid');
  const imlGrid  = document.getElementById('iml-grid');
  imbbGrid.innerHTML = '';
  imlGrid.innerHTML  = '';

  imbb.forEach(c => imbbGrid.appendChild(buildCard(c)));
  iml.forEach(c  => imlGrid.appendChild(buildCard(c)));

  document.getElementById('status').style.display = 'none';
  document.getElementById('yearbook-doc').style.display = 'block';
}

/* ══════════════════════════════════════════
   INIT — single render, no double-render cache poisoning
   Strategy: try live sheet first (8-second timeout).
   Fall back to embedded snapshot if fetch fails or times out.
   renderYearbook() is called EXACTLY ONCE.
══════════════════════════════════════════ */
async function init() {
  const embedded = EMBEDDED_RAW.filter(c => c.name).map(c => ({
    name:          c.name,
    title:         c.title,
    country:       c.country || '',
    contest:       inferContest(c.title),
    photoUrl:      c.fileId ? drivePhoto(c.fileId, 'w800') : null,
    photoFallback: c.fileId ? drivePhoto(c.fileId, 'w400') : null,
  }));

  let contestants = embedded;

  try {
    const sheetUrl = `https://docs.google.com/spreadsheets/d/${CONTESTANTS_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(CONTESTANTS_SHEET_TAB)}`;
    const ctrl     = new AbortController();
    const timeout  = setTimeout(() => ctrl.abort(), 8000);
    const res = await fetch(sheetUrl, { signal: ctrl.signal });
    clearTimeout(timeout);

    if (res.ok) {
      const rows = parseCSV(await res.text());
      if (rows.length >= 2) {
        const live = rows.slice(1)
          .filter(r => (r[28]||'').trim().toUpperCase() === 'YES')
          .map(r => ({
            name:          (r[2] ||'').trim(),
            title:         (r[3] ||'').trim(),
            country:       (r[23]||'').trim(),
            contest:       (r[24]||'').trim().toUpperCase() || inferContest((r[3]||'').trim()),
            photoUrl:      drivePhoto((r[5]||'').trim(), 'w800'),
            photoFallback: drivePhoto((r[5]||'').trim(), 'w400'),
          }))
          .filter(c => c.name);
        if (live.length) contestants = live;
      }
    }
  } catch(e) {
    console.log('[Yearbook] Live fetch unavailable — using embedded snapshot.');
  }

  /* ONE render — Drive thumbnail URLs are requested for the first time here */
  renderYearbook(contestants);
}

init();
</script>
