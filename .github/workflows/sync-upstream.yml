name: Sync Fork with Upstream

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diagnose and sync
        run: |
          set -x

          echo "=== Git version ==="
          git --version

          echo "=== Current remotes ==="
          git remote -v

          echo "=== Setting remote URLs ==="
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git remote add upstream https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Tintinex/IMLBBContestantHandbook.git

          echo "=== Fetching upstream ==="
          git fetch upstream 2>&1

          echo "=== Current branch ==="
          git branch -a

          echo "=== Merging ==="
          git merge upstream/main --no-edit --allow-unrelated-histories 2>&1

          echo "=== Pushing ==="
          git push origin main 2>&1
